services:
  postgres:
    image: postgres:16-alpine
    container_name: billingmind-postgres
    environment:
      POSTGRES_USER: billingmind
      POSTGRES_PASSWORD: billingmind
      POSTGRES_DB: billingmind
    ports:
      - "5433:5432"
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billingmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: billingmind-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata: